<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Compact floating toolbar -->
  <div class="toolbar">
    <div class="toolbar-buttons">

      <button class="tb-btn" id="btnFullscreen">
        <span class="tb-icon">⬛</span>
        <span class="tb-label">全螢幕</span>
        <span class="tb-shortcut">⌘⌃1</span>
      </button>

      <button class="tb-btn" id="btnWindow">
        <span class="tb-icon">◻</span>
        <span class="tb-label">視窗</span>
        <span class="tb-shortcut">⌘⌃2</span>
      </button>

      <button class="tb-btn tb-btn-highlight" id="btnRect">
        <span class="tb-icon">⬚</span>
        <span class="tb-label">矩形</span>
        <span class="tb-shortcut">⌘⌃X</span>
      </button>

      <div class="tb-btn tb-delay-widget" id="btnDelayed">
        <span class="tb-icon">⏱</span>
        <div class="tb-label-sel">
          <span class="tb-label">延遲</span>
          <select class="tb-delay-sel" id="delaySelect">
            <option value="0">0s</option>
            <option value="1">1s</option>
            <option value="2">2s</option>
            <option value="3">3s</option>
          </select>
        </div>
      </div>

      <!-- Countdown overlay (shown inside toolbar during delay) -->
      <div class="countdown-overlay hidden" id="countdownOverlay">
        <span class="countdown-num" id="countdownNum">3</span>
        <span class="countdown-esc">Esc 取消</span>
      </div>

      <button class="tb-btn" id="btnOpenImage">
        <span class="tb-icon">🖼</span>
        <span class="tb-label">開啟</span>
      </button>

      <button class="tb-btn" id="btnBatch">
        <span class="tb-icon">🔄</span>
        <span class="tb-label">批次轉</span>
      </button>

    </div>

    <div class="tb-divider"></div>

    <button class="tb-help" id="helpBtn" aria-label="快捷鍵說明">?</button>
  </div>

  <!-- Keyboard shortcut help modal -->
  <div class="modal-overlay hidden" id="helpModal">
    <div class="modal">
      <div class="modal-header">
        <h2>快捷鍵說明</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="shortcut-section">
          <h3>全域快捷鍵</h3>
          <table>
            <tr><td>全螢幕截圖</td><td><kbd>⌘</kbd><kbd>⌃</kbd><kbd>1</kbd></td></tr>
            <tr><td>視窗截圖</td><td><kbd>⌘</kbd><kbd>⌃</kbd><kbd>2</kbd></td></tr>
            <tr><td>矩形選取截圖</td><td><kbd>⌘</kbd><kbd>⌃</kbd><kbd>X</kbd></td></tr>
          </table>
        </div>
        <div class="shortcut-section">
          <h3>編輯器工具</h3>
          <table>
            <tr><td>矩形框</td><td><kbd>R</kbd></td></tr>
            <tr><td>線條</td><td><kbd>L</kbd></td></tr>
            <tr><td>文字</td><td><kbd>T</kbd></td></tr>
            <tr><td>編號標記</td><td><kbd>N</kbd></td></tr>
            <tr><td>疊入圖片</td><td><kbd>O</kbd></td></tr>
            <tr><td>調整大小</td><td><kbd>S</kbd></td></tr>
            <tr><td>裁切</td><td><kbd>C</kbd></td></tr>
          </table>
        </div>
        <div class="shortcut-section">
          <h3>通用操作</h3>
          <table>
            <tr><td>撤銷</td><td><kbd>⌘</kbd><kbd>Z</kbd></td></tr>
            <tr><td>重做</td><td><kbd>⌘</kbd><kbd>⇧</kbd><kbd>Z</kbd></td></tr>
            <tr><td>刪除選取元素</td><td><kbd>Delete</kbd></td></tr>
            <tr><td>取消 / 離開工具</td><td><kbd>Esc</kbd></td></tr>
            <tr><td>儲存</td><td><kbd>⌘</kbd><kbd>S</kbd></td></tr>
            <tr><td>另存新檔</td><td><kbd>⌘</kbd><kbd>⇧</kbd><kbd>S</kbd></td></tr>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Window picker modal -->
  <div class="modal-overlay hidden" id="windowPickerModal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>選擇視窗</h2>
        <button class="modal-close" id="windowPickerClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="win-picker-grid" id="windowPickerGrid"></div>
      </div>
    </div>
  </div>

  <!-- Batch conversion modal -->
  <div class="modal-overlay hidden" id="batchModal">
    <div class="modal batch-modal">
      <div class="modal-header">
        <h2>批次格式轉換</h2>
        <button class="modal-close" id="batchModalClose">✕</button>
      </div>
      <div class="modal-body batch-body">

        <!-- Drop zone -->
        <div class="batch-dropzone" id="batchDropzone">
          <span class="drop-icon">🖼</span>
          <span class="drop-hint">拖曳圖片至此，或</span>
          <button class="drop-btn" id="batchSelectBtn">選取檔案</button>
        </div>

        <!-- File list (hidden until files added) -->
        <div class="batch-filelist hidden" id="batchFileList">
          <div class="filelist-scroll" id="filelistScroll"></div>
          <div class="filelist-footer">
            <span class="filelist-count" id="filelistCount"></span>
            <button class="add-more-btn" id="batchAddMoreBtn">+ 新增檔案</button>
          </div>
        </div>

        <!-- Options -->
        <div class="batch-options">

          <div class="batch-row">
            <label class="opt-label">轉換為</label>
            <select class="opt-select" id="batchFormat">
              <option value="png" selected>PNG</option>
              <option value="jpg">JPG</option>
              <option value="gif">GIF</option>
            </select>
          </div>

          <div class="batch-row hidden" id="qualityRow">
            <label class="opt-label">品質</label>
            <input class="opt-num" type="number" id="batchQuality" value="90" min="1" max="100">
            <span class="opt-unit">%</span>
          </div>

          <div class="batch-row hidden" id="svgWidthRow">
            <label class="opt-label">SVG 輸出寬度</label>
            <input class="opt-num opt-num-wide" type="number" id="batchSvgWidth" value="1920" min="1" max="8192">
            <span class="opt-unit">px</span>
          </div>

          <div class="batch-divider"></div>

          <div class="batch-row">
            <label class="checkbox-label">
              <input type="checkbox" id="batchResizeCheck">
              <span>統一調整尺寸</span>
            </label>
          </div>

          <div class="batch-row batch-resize-opts hidden" id="resizeOptions">
            <span class="opt-prefix">固定</span>
            <select class="opt-select opt-select-sm" id="batchResizeAxis">
              <option value="width">寬度</option>
              <option value="height">高度</option>
            </select>
            <span class="opt-prefix">為</span>
            <input class="opt-num" type="number" id="batchResizeValue" value="600" min="1" max="8192">
            <span class="opt-unit">px</span>
          </div>

          <div class="batch-divider"></div>

          <div class="opt-label">輸出位置</div>
          <div class="batch-radio-group">
            <label class="radio-label">
              <input type="radio" name="outputMode" value="same" checked>
              <span>同原始檔案目錄</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="outputMode" value="custom">
              <span>指定目錄</span>
              <button class="dir-select-btn hidden" id="batchDirBtn">選擇…</button>
              <span class="dir-path hidden" id="batchDirPath">尚未選擇</span>
            </label>
          </div>

          <div class="batch-row">
            <label class="checkbox-label">
              <input type="checkbox" id="batchDeleteCheck">
              <span>轉換完成後刪除原始檔</span>
            </label>
          </div>

        </div>

        <!-- Same-format warning (hidden until triggered) -->
        <div class="batch-warning hidden" id="batchWarning">
          <div class="warning-icon">⚠️</div>
          <div class="warning-body">
            <div class="warning-title">以下檔案已是目標格式：</div>
            <div class="warning-files" id="warningFiles"></div>
          </div>
          <div class="warning-actions">
            <button class="btn-skip" id="warnSkipBtn">略過這些，繼續轉換</button>
            <button class="btn-cancel-warn" id="warnCancelBtn">取消全部</button>
          </div>
        </div>

        <!-- Progress (hidden until conversion starts) -->
        <div class="batch-progress hidden" id="batchProgressSection">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-meta" id="progressMeta">0 / 0</div>
          <div class="progress-log" id="progressLog"></div>
        </div>

        <button class="batch-start-btn" id="batchStartBtn">開始轉換</button>

      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
