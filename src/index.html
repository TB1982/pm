<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Compact floating toolbar -->
  <div class="toolbar">
    <div class="toolbar-buttons">

      <button class="tb-btn" id="btnFullscreen">
        <span class="tb-icon">⬛</span>
        <span class="tb-label">全螢幕</span>
        <span class="tb-shortcut">⌘⌃1</span>
      </button>

      <button class="tb-btn" id="btnWindow">
        <span class="tb-icon">◻</span>
        <span class="tb-label">視窗</span>
        <span class="tb-shortcut">⌘⌃2</span>
      </button>

      <button class="tb-btn tb-btn-highlight" id="btnRect">
        <span class="tb-icon">⬚</span>
        <span class="tb-label">矩形</span>
        <span class="tb-shortcut">⌘⌃X</span>
      </button>

      <button class="tb-btn" id="btnWebCapture">
        <span class="tb-icon">🌐</span>
        <span class="tb-label">網頁</span>
      </button>

      <button class="tb-btn" id="btnOpenImage">
        <span class="tb-icon">🖼</span>
        <span class="tb-label">開啟</span>
      </button>

    </div>

    <div class="tb-divider"></div>

    <button class="tb-help" id="helpBtn" aria-label="快捷鍵說明">?</button>
  </div>

  <!-- Keyboard shortcut help modal (shown when window expands) -->
  <div class="modal-overlay hidden" id="helpModal">
    <div class="modal">
      <div class="modal-header">
        <h2>快捷鍵說明</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="shortcut-section">
          <h3>全域快捷鍵</h3>
          <table>
            <tr><td>全螢幕截圖</td><td><kbd>⌘</kbd><kbd>⌃</kbd><kbd>1</kbd></td></tr>
            <tr><td>視窗截圖</td><td><kbd>⌘</kbd><kbd>⌃</kbd><kbd>2</kbd></td></tr>
            <tr><td>矩形選取截圖</td><td><kbd>⌘</kbd><kbd>⌃</kbd><kbd>X</kbd></td></tr>
          </table>
        </div>
        <div class="shortcut-section">
          <h3>編輯器工具</h3>
          <table>
            <tr><td>矩形框</td><td><kbd>R</kbd></td></tr>
            <tr><td>線條</td><td><kbd>L</kbd></td></tr>
            <tr><td>文字</td><td><kbd>T</kbd></td></tr>
            <tr><td>編號標記</td><td><kbd>N</kbd></td></tr>
            <tr><td>疊入圖片</td><td><kbd>O</kbd></td></tr>
            <tr><td>調整大小</td><td><kbd>S</kbd></td></tr>
            <tr><td>裁切</td><td><kbd>C</kbd></td></tr>
          </table>
        </div>
        <div class="shortcut-section">
          <h3>通用操作</h3>
          <table>
            <tr><td>撤銷</td><td><kbd>⌘</kbd><kbd>Z</kbd></td></tr>
            <tr><td>重做</td><td><kbd>⌘</kbd><kbd>⇧</kbd><kbd>Z</kbd></td></tr>
            <tr><td>刪除選取元素</td><td><kbd>Delete</kbd></td></tr>
            <tr><td>取消 / 離開工具</td><td><kbd>Esc</kbd></td></tr>
            <tr><td>儲存</td><td><kbd>⌘</kbd><kbd>S</kbd></td></tr>
            <tr><td>另存新檔</td><td><kbd>⌘</kbd><kbd>⇧</kbd><kbd>S</kbd></td></tr>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Window picker modal (shown when window expands) -->
  <div class="modal-overlay hidden" id="windowPickerModal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2>選擇視窗</h2>
        <button class="modal-close" id="windowPickerClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="win-picker-grid" id="windowPickerGrid"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="renderer.js"></script>
</body>
</html>
