<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Compact floating toolbar -->
  <div class="toolbar" data-tauri-drag-region>
    <div class="toolbar-buttons">

      <button class="tb-btn" id="btnFullscreen">
        <span class="tb-icon">⬛</span>
        <span class="tb-label" data-i18n="fullscreen">全螢幕</span>
        <span class="tb-shortcut">⌘⌃1</span>
      </button>

      <button class="tb-btn" id="btnWindow">
        <span class="tb-icon">◻</span>
        <span class="tb-label" data-i18n="window">視窗</span>
        <span class="tb-shortcut">⌘⌃2</span>
      </button>

      <button class="tb-btn tb-btn-highlight" id="btnRect">
        <span class="tb-icon">⬚</span>
        <span class="tb-label" data-i18n="region">矩形</span>
        <span class="tb-shortcut">⌘⌃X</span>
      </button>

      <div class="tb-btn tb-delay-widget" id="btnDelayed">
        <span class="tb-icon">⏱</span>
        <div class="tb-label-sel">
          <span class="tb-label" data-i18n="delay">延遲</span>
          <select class="tb-delay-sel" id="delaySelect">
            <option value="0">0s</option>
            <option value="1">1s</option>
            <option value="2">2s</option>
            <option value="3">3s</option>
          </select>
        </div>
      </div>

      <!-- Countdown overlay (shown inside toolbar during delay) -->
      <div class="countdown-overlay hidden" id="countdownOverlay">
        <span class="countdown-num" id="countdownNum">3</span>
        <span class="countdown-esc" data-i18n="esc_cancel">Esc 取消</span>
      </div>

      <button class="tb-btn" id="btnOpenImage">
        <span class="tb-icon">🖼</span>
        <span class="tb-label" data-i18n="open">開啟</span>
      </button>

      <button class="tb-btn" id="btnWhiteboard">
        <span class="tb-icon">⬜</span>
        <span class="tb-label" data-i18n="whiteboard">白板</span>
      </button>

      <button class="tb-btn" id="btnBatch">
        <span class="tb-icon">🔄</span>
        <span class="tb-label" data-i18n="batch">批次轉</span>
      </button>

    </div>

    <div class="tb-divider"></div>

    <button class="tb-help" id="helpBtn" data-i18n-aria="help_title" aria-label="快捷鍵說明">?</button>

    <div class="tb-drag-handle" data-tauri-drag-region aria-hidden="true">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Keyboard shortcut help modal -->
  <div class="modal-overlay hidden" id="helpModal">
    <div class="modal">
      <div class="modal-header">
        <h2 data-i18n="help_title">快捷鍵說明</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="shortcut-section">
          <h3 data-i18n="help_global">全域快捷鍵</h3>
          <table>
            <tr><td data-i18n="help_fullscreen_capture">全螢幕截圖</td><td><kbd>⌘</kbd><kbd>⌃</kbd><kbd>1</kbd></td></tr>
            <tr><td data-i18n="help_window_capture">視窗截圖</td><td><kbd>⌘</kbd><kbd>⌃</kbd><kbd>2</kbd></td></tr>
            <tr><td data-i18n="help_region_capture">矩形選取截圖</td><td><kbd>⌘</kbd><kbd>⌃</kbd><kbd>X</kbd></td></tr>
          </table>
        </div>
        <div class="shortcut-section">
          <h3 data-i18n="help_editor">編輯器工具</h3>
          <table>
            <tr><td data-i18n="help_rect">矩形框</td><td><kbd>R</kbd></td></tr>
            <tr><td data-i18n="help_line">線條</td><td><kbd>L</kbd></td></tr>
            <tr><td data-i18n="help_text">文字</td><td><kbd>T</kbd></td></tr>
            <tr><td data-i18n="help_number">編號標記</td><td><kbd>N</kbd></td></tr>
            <tr><td data-i18n="help_overlay">疊入圖片</td><td><kbd>O</kbd></td></tr>
            <tr><td data-i18n="help_resize">調整大小</td><td><kbd>S</kbd></td></tr>
            <tr><td data-i18n="help_crop">裁切</td><td><kbd>C</kbd></td></tr>
          </table>
        </div>
        <div class="shortcut-section">
          <h3 data-i18n="help_general">通用操作</h3>
          <table>
            <tr><td data-i18n="help_undo">撤銷</td><td><kbd>⌘</kbd><kbd>Z</kbd></td></tr>
            <tr><td data-i18n="help_redo">重做</td><td><kbd>⌘</kbd><kbd>⇧</kbd><kbd>Z</kbd></td></tr>
            <tr><td data-i18n="help_delete">刪除選取元素</td><td><kbd>Delete</kbd></td></tr>
            <tr><td data-i18n="help_escape">取消 / 離開工具</td><td><kbd>Esc</kbd></td></tr>
            <tr><td data-i18n="help_save">儲存</td><td><kbd>⌘</kbd><kbd>S</kbd></td></tr>
            <tr><td data-i18n="help_save_as">另存新檔</td><td><kbd>⌘</kbd><kbd>⇧</kbd><kbd>S</kbd></td></tr>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Window picker modal -->
  <div class="modal-overlay hidden" id="windowPickerModal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h2 data-i18n="picker_title">選擇視窗</h2>
        <button class="modal-close" id="windowPickerClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="win-picker-grid" id="windowPickerGrid"></div>
      </div>
    </div>
  </div>

  <!-- Batch conversion modal -->
  <div class="modal-overlay hidden" id="batchModal">
    <div class="modal batch-modal">
      <div class="modal-header">
        <h2 data-i18n="batch_title">批次格式轉換</h2>
        <button class="modal-close" id="batchModalClose">✕</button>
      </div>
      <div class="modal-body batch-body">

        <!-- Drop zone -->
        <div class="batch-dropzone" id="batchDropzone">
          <span class="drop-icon">🖼</span>
          <span class="drop-hint" data-i18n="batch_drop_hint">拖曳圖片至此，或</span>
          <button class="drop-btn" id="batchSelectBtn" data-i18n="batch_select_btn">選取檔案</button>
        </div>

        <!-- File list (hidden until files added) -->
        <div class="batch-filelist hidden" id="batchFileList">
          <div class="filelist-scroll" id="filelistScroll"></div>
          <div class="filelist-footer">
            <span class="filelist-count" id="filelistCount"></span>
            <button class="add-more-btn" id="batchAddMoreBtn" data-i18n="batch_add_more">+ 新增檔案</button>
          </div>
        </div>

        <!-- Options -->
        <div class="batch-options">

          <div class="batch-row">
            <label class="opt-label" data-i18n="batch_convert_to">轉換為</label>
            <select class="opt-select" id="batchFormat">
              <option value="png" selected>PNG</option>
              <option value="jpg">JPG</option>
              <option value="webp">WebP</option>
              <option value="gif">GIF</option>
            </select>
          </div>

          <div class="batch-row hidden" id="qualityRow">
            <label class="opt-label" data-i18n="batch_quality">品質</label>
            <input class="opt-num" type="number" id="batchQuality" value="90" min="1" max="100">
            <span class="opt-unit">%</span>
          </div>

          <div class="batch-row hidden" id="svgWidthRow">
            <label class="opt-label" data-i18n="batch_svg_width">SVG 輸出寬度</label>
            <input class="opt-num opt-num-wide" type="number" id="batchSvgWidth" value="1920" min="1" max="8192">
            <span class="opt-unit">px</span>
          </div>

          <div class="batch-divider"></div>

          <div class="batch-row">
            <label class="checkbox-label">
              <input type="checkbox" id="batchResizeCheck">
              <span data-i18n="batch_resize_all">統一調整尺寸</span>
            </label>
          </div>

          <div class="batch-row batch-resize-opts hidden" id="resizeOptions">
            <span class="opt-prefix" data-i18n="batch_fix">固定</span>
            <select class="opt-select opt-select-sm" id="batchResizeAxis">
              <option value="width" data-i18n="batch_width">寬度</option>
              <option value="height" data-i18n="batch_height">高度</option>
            </select>
            <span class="opt-prefix" data-i18n="batch_to">為</span>
            <input class="opt-num" type="number" id="batchResizeValue" value="600" min="1" max="8192">
            <span class="opt-unit">px</span>
          </div>

          <div class="batch-divider"></div>

          <div class="opt-label" data-i18n="batch_output">輸出位置</div>
          <div class="batch-radio-group">
            <label class="radio-label">
              <input type="radio" name="outputMode" value="same" checked>
              <span data-i18n="batch_same_dir">同原始檔案目錄</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="outputMode" value="custom">
              <span data-i18n="batch_custom_dir">指定目錄</span>
              <button class="dir-select-btn hidden" id="batchDirBtn" data-i18n="batch_choose">選擇…</button>
              <span class="dir-path hidden" id="batchDirPath" data-i18n="batch_not_selected">尚未選擇</span>
            </label>
          </div>

          <div class="batch-row">
            <label class="checkbox-label">
              <input type="checkbox" id="batchDeleteCheck">
              <span data-i18n="batch_delete_orig">轉換完成後刪除原始檔</span>
            </label>
          </div>

          <div class="batch-divider"></div>

          <!-- 浮水印 -->
          <div class="batch-row">
            <label class="checkbox-label">
              <input type="checkbox" id="batchWatermarkCheck">
              <span data-i18n="batch_wm_enable">加入浮水印</span>
            </label>
          </div>

          <div class="batch-wm-opts hidden" id="watermarkOptions">

            <!-- 文字浮水印 -->
            <div class="batch-row">
              <label class="checkbox-label">
                <input type="checkbox" id="wmTextCheck">
                <span data-i18n="batch_wm_text">文字</span>
              </label>
            </div>
            <div class="batch-wm-sub hidden" id="wmTextOpts">
              <div class="wm-panel">
                <div class="wm-controls">
                  <div class="batch-row">
                    <span class="opt-label" data-i18n="batch_wm_size">字級</span>
                    <input class="opt-num" type="number" id="wmTextSize" value="32" min="8" max="300">
                    <span class="opt-unit">px</span>
                    <span class="opt-label" data-i18n="batch_wm_opacity">不透明</span>
                    <input class="opt-num" type="number" id="wmTextOpacity" value="80" min="1" max="100">
                    <span class="opt-unit">%</span>
                    <!-- 自製色塊：wrapper 提供 position:relative，讓色盤從色塊附近彈出 -->
                    <span class="wm-color-wrapper">
                      <div class="wm-color-swatch" id="wmTextColorSwatch" title="選擇顏色"></div>
                      <input type="color" id="wmTextColor" value="#ffffff" class="wm-color-hidden">
                    </span>
                  </div>
                  <div class="batch-row">
                    <input class="opt-text-input" type="text" id="wmText"
                      data-i18n-placeholder="batch_wm_text_placeholder" placeholder="輸入浮水印文字">
                  </div>
                </div>
                <div class="wm-position-col">
                  <span class="wm-pos-header" data-i18n="batch_wm_position">位置</span>
                  <div class="wm-grid" id="wmTextGrid">
                    <button class="wm-cell" data-pos="northwest">↖</button>
                    <button class="wm-cell" data-pos="north">↑</button>
                    <button class="wm-cell" data-pos="northeast">↗</button>
                    <button class="wm-cell" data-pos="west">←</button>
                    <button class="wm-cell" data-pos="centre">·</button>
                    <button class="wm-cell" data-pos="east">→</button>
                    <button class="wm-cell" data-pos="southwest">↙</button>
                    <button class="wm-cell" data-pos="south">↓</button>
                    <button class="wm-cell active" data-pos="southeast">↘</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- 圖片浮水印 -->
            <div class="batch-row">
              <label class="checkbox-label">
                <input type="checkbox" id="wmImgCheck">
                <span data-i18n="batch_wm_img">圖片（Logo）</span>
              </label>
            </div>
            <div class="batch-wm-sub hidden" id="wmImgOpts">
              <!-- 檔案選取列 -->
              <div class="batch-row">
                <button class="dir-select-btn" id="wmImgSelectBtn" data-i18n="batch_wm_choose_img">選取圖片…</button>
                <span class="dir-path" id="wmImgPath" data-i18n="batch_not_selected">尚未選擇</span>
              </div>
              <!-- 3欄：預覽方塊 ｜ 數值設定 ｜ 位置格 -->
              <div class="wm-img-layout">
                <!-- 左：預覽方塊 (Logo 比例) -->
                <div class="wm-img-preview" id="wmImgPreview">
                  <span class="wm-img-preview-hint" data-i18n="batch_wm_preview">預覽</span>
                </div>
                <!-- 中：數值設定 -->
                <div class="wm-img-controls">
                  <div class="batch-row">
                    <span class="opt-label" data-i18n="batch_wm_img_size">寬度佔比</span>
                    <input class="opt-num" type="number" id="wmImgSize" value="20" min="1" max="100">
                    <span class="opt-unit">%</span>
                  </div>
                  <div class="batch-row">
                    <span class="opt-label" data-i18n="batch_wm_opacity">不透明</span>
                    <input class="opt-num" type="number" id="wmImgOpacity" value="80" min="1" max="100">
                    <span class="opt-unit">%</span>
                  </div>
                </div>
                <!-- 右：位置 9-grid -->
                <div class="wm-position-col">
                  <span class="wm-pos-header" data-i18n="batch_wm_position">位置</span>
                  <div class="wm-grid" id="wmImgGrid">
                    <button class="wm-cell" data-pos="northwest">↖</button>
                    <button class="wm-cell" data-pos="north">↑</button>
                    <button class="wm-cell" data-pos="northeast">↗</button>
                    <button class="wm-cell" data-pos="west">←</button>
                    <button class="wm-cell" data-pos="centre">·</button>
                    <button class="wm-cell" data-pos="east">→</button>
                    <button class="wm-cell" data-pos="southwest">↙</button>
                    <button class="wm-cell" data-pos="south">↓</button>
                    <button class="wm-cell active" data-pos="southeast">↘</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- 共用邊距（文字與圖片浮水印共享，始終顯示於浮水印選項底部） -->
            <div class="batch-row wm-margin-row">
              <span class="opt-label" data-i18n="batch_wm_margin">邊距</span>
              <input class="opt-num" type="number" id="wmMargin" value="40" min="0" max="500">
              <span class="opt-unit">px</span>
            </div>

          </div>

        </div>

        <!-- Same-format warning (hidden until triggered) -->
        <div class="batch-warning hidden" id="batchWarning">
          <div class="warning-icon">⚠️</div>
          <div class="warning-body">
            <div class="warning-title" data-i18n="batch_same_format_title">以下檔案已是目標格式：</div>
            <div class="warning-files" id="warningFiles"></div>
          </div>
          <div class="warning-actions">
            <button class="btn-skip" id="warnSkipBtn" data-i18n="batch_skip">略過這些，繼續轉換</button>
            <button class="btn-cancel-warn" id="warnCancelBtn" data-i18n="batch_cancel_all">取消全部</button>
          </div>
        </div>

        <!-- Progress (hidden until conversion starts) -->
        <div class="batch-progress hidden" id="batchProgressSection">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-meta" id="progressMeta">0 / 0</div>
          <div class="progress-log" id="progressLog"></div>
        </div>

        <button class="batch-start-btn" id="batchStartBtn" data-i18n="batch_start">開始轉換</button>

      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- New canvas modal -->
  <div class="modal-overlay hidden" id="newCanvasModal">
    <div class="modal">
      <div class="modal-header">
        <h2 data-i18n="newcanvas_title">新開畫布</h2>
        <button class="modal-close" id="newCanvasModalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="nc-fields">
          <div class="nc-row">
            <span class="nc-lbl" data-i18n="newcanvas_preset">預設尺寸</span>
            <select id="newCanvasPreset" class="nc-select">
              <option value="custom" data-i18n="newcanvas_custom">自訂</option>
              <optgroup label="螢幕">
                <option value="1280x720">HD（1280 × 720）</option>
                <option value="1920x1080">Full HD（1920 × 1080）</option>
                <option value="2560x1440">2K（2560 × 1440）</option>
                <option value="3840x2160">4K（3840 × 2160）</option>
              </optgroup>
              <optgroup label="紙張（72 dpi）">
                <option value="595x842">A4 直（595 × 842）</option>
                <option value="842x595">A4 橫（842 × 595）</option>
                <option value="842x1191">A3 直（842 × 1191）</option>
                <option value="1191x842">A3 橫（1191 × 842）</option>
              </optgroup>
              <optgroup label="社群媒體（建議尺寸）">
                <option value="1080x1080">IG 貼文 1:1（1080 × 1080）</option>
                <option value="1080x1350">IG 貼文 4:5（1080 × 1350）</option>
                <option value="1080x1920">IG / TikTok Story 9:16（1080 × 1920）</option>
                <option value="1200x630">Facebook 貼文（1200 × 630）</option>
                <option value="1600x900">X / Twitter（1600 × 900）</option>
                <option value="1200x627">LinkedIn（1200 × 627）</option>
                <option value="1280x720">YouTube 縮圖（1280 × 720）</option>
              </optgroup>
              <optgroup label="其他">
                <option value="1000x1000">正方形（1000 × 1000）</option>
                <option value="800x600">800 × 600</option>
              </optgroup>
            </select>
          </div>
          <div class="nc-row">
            <span class="nc-lbl" data-i18n="resize_width">寬度</span>
            <input type="number" id="newCanvasW" min="1" max="99999" value="1920" class="nc-input">
            <span class="nc-unit">px</span>
          </div>
          <div class="nc-row">
            <span class="nc-lbl" data-i18n="resize_height">高度</span>
            <input type="number" id="newCanvasH" min="1" max="99999" value="1080" class="nc-input">
            <span class="nc-unit">px</span>
          </div>
          <div class="nc-row">
            <span class="nc-lbl" data-i18n="newcanvas_bg">背景顏色</span>
            <div class="nc-bg-row">
              <input type="color" id="newCanvasBg" value="#ffffff" class="nc-color">
              <button class="nc-trans-btn" id="newCanvasTrans" data-i18n="newcanvas_transparent">透明</button>
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" id="btnNewCanvasCancel" data-i18n="resize_cancel">取消</button>
          <button class="btn-primary" id="btnNewCanvasOk" data-i18n="newcanvas_create">建立</button>
        </div>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="tauri-bridge.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
